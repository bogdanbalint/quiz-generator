<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #0f0e0d;
            --paper: #f5f2ed;
            --accent: #e8441a;
            --accent-hover: #c93510;
            --muted: #7a756e;
            --border: #d8d3cb;
            --card: #ffffff;
            --error-bg: #fff3f0;
            --error-border: #f5c2b8;
            --error-text: #b93320;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            overflow: hidden;
        }

        .panel-left {
            width: 42%;
            background-color: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 52px;
            position: relative;
            overflow: hidden;
            animation: slideInLeft 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-60px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        .panel-left::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,68,26,0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        .panel-left::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,68,26,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .panel-headline {
            position: relative;
            z-index: 1;
        }

        .panel-headline h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.4rem, 3.5vw, 3.2rem);
            color: #fff;
            line-height: 1.08;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
        }

        .panel-headline h2 span {
            color: var(--accent);
        }

        .panel-headline p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.5);
            max-width: 300px;
            font-weight: 300;
        }

        .panel-stats {
            display: flex;
            gap: 32px;
            position: relative;
            z-index: 1;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-number {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.04em;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .panel-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            animation: fadeUp 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .form-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .form-header {
            margin-bottom: 36px;
        }

        .form-header .step-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .form-header .step-label::before {
            content: '';
            display: block;
            width: 20px;
            height: 1.5px;
            background: var(--accent);
        }

        .form-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            color: var(--ink);
        }

        .global-error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-left: 3px solid var(--error-text);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            color: var(--error-text);
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 28px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,14,13,0.06);
        }

        .input-wrap:focus-within .field-icon {
            color: var(--ink);
        }

        .field.has-error .input-wrap input {
            border-color: var(--error-text);
        }

        .field-error {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--error-text);
        }

        .field-error::before {
            content: '!';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            background: var(--error-text);
            color: white;
            border-radius: 50%;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-submit:hover {
            background: #2a2826;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit svg {
            width: 16px;
            height: 16px;
        }

        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .form-footer a {
            color: var(--ink);
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1.5px solid var(--border);
            padding-bottom: 1px;
            transition: border-color 0.2s, color 0.2s;
        }

        .form-footer a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
                flex-direction: column;
            }

            .panel-left {
                width: 100%;
                padding: 32px 28px;
                min-height: unset;
            }

            .panel-headline h2 {
                font-size: 2rem;
            }

            .panel-stats {
                display: none;
            }

            .panel-right {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>

<aside class="panel-left">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
            </svg>
        </div>
        <span class="brand-name">QuizGen</span>
    </div>

    <div class="panel-headline">
        <h2>Build quizzes<br>in <span>seconds.</span></h2>
        <p>Generate, share, and track engaging quizzes with AI-powered question generation.</p>
    </div>

    <div class="panel-stats">
        <div class="stat">
            <span class="stat-number">12k+</span>
            <span class="stat-label">Quizzes</span>
        </div>
        <div class="stat">
            <span class="stat-number">98%</span>
            <span class="stat-label">Satisfaction</span>
        </div>
        <div class="stat">
            <span class="stat-number">4.9★</span>
            <span class="stat-label">Rating</span>
        </div>
    </div>
</aside>

<main class="panel-right">
    <div class="form-wrapper">
        <div class="form-header">
            <span class="step-label">Get started</span>
            <h1>Create account</h1>
        </div>

        <div th:if="${registerError}" class="global-error">
            <p th:text="${registerError}"></p>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="field-group">

                <div class="field" th:classappend="${#fields.hasErrors('username')} ? ' has-error'">
                    <label>Username</label>
                    <div class="input-wrap">
                        <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" th:field="*{username}" placeholder="e.g. johndoe">
                    </div>
                    <div th:if="${#fields.hasErrors('username')}" class="field-error">
                        <span th:errors="*{username}"></span>
                    </div>
                </div>

                <div class="field" th:classappend="${#fields.hasErrors('email')} ? ' has-error'">
                    <label>Email</label>
                    <div class="input-wrap">
                        <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input type="email" th:field="*{email}" placeholder="you@example.com">
                    </div>
                    <div th:if="${#fields.hasErrors('email')}" class="field-error">
                        <span th:errors="*{email}"></span>
                    </div>
                </div>

                <div class="field" th:classappend="${#fields.hasErrors('password')} ? ' has-error'">
                    <label>Password</label>
                    <div class="input-wrap">
                        <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" th:field="*{password}" placeholder="min. 6 characters">
                    </div>
                    <div th:if="${#fields.hasErrors('password')}" class="field-error">
                        <span th:errors="*{password}"></span>
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-submit">
                Create account
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"/>
                    <path d="m12 5 7 7-7 7"/>
                </svg>
            </button>
        </form>

        <p class="form-footer">
            Already have an account?
            <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</main>

</body>
</html>
